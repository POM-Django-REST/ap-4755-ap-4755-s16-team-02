{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h3 class="text-center mb-3">Вхід у систему</h3>
        <form action="{% url 'login' %}" method="POST" class="card p-4 shadow-sm">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100">
                Увійти
            </button>

            <p class="mt-3 text-center">
                Немає акаунту?
                <a href="{% url 'register' %}">
                    Зареєструватись
                </a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
