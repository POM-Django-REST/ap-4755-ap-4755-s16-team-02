{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <div class="card">
        <div class="card-body">

            <h2>Видалення користувача</h2>

            <p>
                Ви дійсно хочете видалити користувача:
                <strong>{{ user_obj.email }}</strong>?
            </p>

            <form method="POST">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Видалити
                </button>

                <a href="{% url 'user_list' %}" class="btn btn-secondary">
                    Скасувати
                </a>
            </form>

        </div>
    </div>

</div>
{% endblock %}
