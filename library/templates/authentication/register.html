{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <h3 class="text-center mb-3">Реєстрація</h3>
        <form action="{% url 'register' %}" method="POST" class="card p-4 shadow-sm">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100">
                Зареєструватись
            </button>
        </form>
    </div>
</div>
{% endblock %}
