{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <h2>Редагування користувача</h2>

    <form method="POST" class="card p-4 mt-3">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Зберегти
        </button>

        <a href="{% url 'user_list' %}" class="btn btn-secondary">
            Скасувати
        </a>
    </form>

</div>
{% endblock %}
