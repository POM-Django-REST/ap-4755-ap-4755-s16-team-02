{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3>Додати нового автора</h3>

        <form action="{% url 'author_create' %}" method="POST" class="card p-4 mt-3">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">Зберегти автора</button>
            <a href="{% url 'authors_list' %}" class="btn btn-secondary mt-2">Скасувати</a>
        </form>
    </div>
</div>
{% endblock %}
