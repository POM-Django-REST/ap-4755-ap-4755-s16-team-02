{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">

    <div class="card">
        <div class="card-body">

            <h3>Видалити книгу?</h3>

            <p>
                Ви дійсно хочете видалити:
                <strong>{{ book.name }}</strong> ?
            </p>

            <form method="POST">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Так, видалити
                </button>

                <a href="{% url 'book_list' %}" class="btn btn-secondary">
                    Скасувати
                </a>
            </form>

        </div>
    </div>

</div>
{% endblock %}
