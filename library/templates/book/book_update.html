{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h3>Редагувати книгу</h3>

        <form method="POST" class="card p-4 mt-3">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Зберегти
            </button>

            <a href="{% url 'book_list' %}" class="btn btn-secondary mt-2">
                Скасувати
            </a>
        </form>
    </div>
</div>
{% endblock %}
